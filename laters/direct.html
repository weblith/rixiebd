<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kavya Menu</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Pacifico&display=swap');

  body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(145deg, #ffe4f0, #ffd6ef, #ffeaf7);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    overflow-y: auto;
    font-family: 'Nunito', sans-serif;
    position: relative;
    padding: 20px;
    box-sizing: border-box;
  }

  h1 {
    font-family: 'Pacifico', cursive;
    color: #ff7ac8;
    font-size: clamp(1.8rem, 6vw, 2.8rem);
    margin-bottom: clamp(20px, 5vw, 40px);
    text-shadow: 0 0 15px rgba(255, 120, 200, 0.7),
                 0 0 25px rgba(255, 180, 240, 0.6);
    animation: floatTitle 3s ease-in-out infinite;
    text-align: center;
  }

  @keyframes floatTitle {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .buttons-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    max-width: 440px;
    width: 100%;
    grid-gap: 20px;
    justify-content: center;
    align-items: center;
    background: rgba(255, 255, 255, 0.35);
    border-radius: 30px;
    padding: clamp(20px, 5vw, 30px) clamp(20px, 5vw, 40px);
    box-shadow: 0 10px 40px rgba(255, 180, 220, 0.5),
                inset 0 0 20px rgba(255, 255, 255, 0.3);
    backdrop-filter: blur(10px);
    animation: floatBox 4s ease-in-out infinite;
    box-sizing: border-box;
  }

  @keyframes floatBox {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-6px) scale(1.02); }
  }

  button {
    background: linear-gradient(135deg, #ffa8e1, #ffbde8);
    border: none;
    color: white;
    font-size: 1.1em;
    font-weight: 700;
    padding: 14px 20px;
    border-radius: 20px;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(255, 105, 180, 0.4);
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    outline: none;
    min-height: 44px;
    touch-action: manipulation;
  }

  button:hover {
    transform: scale(1.05) rotate(-2deg);
    background: linear-gradient(135deg, #ffc0eb, #ff7fcc);
    box-shadow: 0 8px 30px rgba(255, 90, 180, 0.6);
  }

  @media (max-width: 380px) {
    .buttons-grid {
      grid-template-columns: 1fr;
      grid-gap: 15px;
    }
    button {
      font-size: 1em;
      padding: 12px 16px;
    }
  }

  button::before {
    content: "";
    position: absolute;
    width: 0;
    height: 300%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(45deg);
    background: rgba(255, 255, 255, 0.4);
    transition: width 0.5s ease;
  }

  button:hover::before {
    width: 250%;
  }

  /* Cute floating bubbles */
  .bubble {
    position: absolute;
    bottom: -20px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), rgba(255,180,220,0.4));
    animation: rise 10s linear infinite;
    opacity: 0.8;
    filter: blur(0.5px);
  }
  .soft-bubble, .bubble {
    pointer-events: none;
  }

  @keyframes rise {
    0% {
      transform: translateY(0) scale(1);
      opacity: 0.7;
    }
    100% {
      transform: translateY(-110vh) scale(1.3);
      opacity: 0;
    }
  }

  /* Soft background glow bubbles (larger, slower) */
  .soft-bubble {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 40%, rgba(255,240,250,0.6), rgba(255,190,230,0.2));
    opacity: 0.4;
    animation: softFloat 15s ease-in-out infinite;
  }

  @keyframes softFloat {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-20px) scale(1.1); }
  }
</style>

<style>
.mouse-bubble {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  opacity: 1;
  filter: blur(1px);
  box-shadow: 0 0 10px rgba(255,180,220,0.8), 0 0 20px rgba(255,160,210,0.5);
  transition: opacity 0.8s ease, transform 0.8s ease;
  z-index: 9999;
}
</style>
  
</head>
<body>
  <h1>What do you wanna see next, Kavya? XD </h1>
  <div class="buttons-grid">
    <button onclick="location.href='card/index.html'">🎂 Birthday Card</button>
    <button onclick="location.href='note/index.html'">💌 Birthday Note</button>
    <button onclick="location.href='games/toc.html'">🎮 Fun Games</button>
    <button onclick="showGenshinPopup()">🤫 Secret Gift</button>

  <div id="genshinPopup" style="
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.8);
  background: rgba(255, 220, 240, 0.96);
  color: #ff68b3;
  font-family: 'Pacifico', cursive;
  padding: 20px clamp(15px, 5vw, 40px);
  border-radius: 25px;
  font-size: clamp(16px, 5vw, 24px);
  text-align: center;
  box-shadow: 0 0 30px rgba(255, 150, 210, 0.7);
  z-index: 9999;
  opacity: 0;
  transition: all 0.6s ease;
  width: min(320px, 90vw);
">
🌸 Open Genshin Impact 💫
</div>
      
  </div>
  <!-- Cute Right-Click Popup -->
  <div id="rightClickPopup" style="
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255, 182, 193, 0.95);
    color: #000;
    font-family: 'Signika', sans-serif;
    padding: 20px clamp(15px, 5vw, 40px);
    border-radius: 20px;
    font-size: clamp(16px, 4.5vw, 20px);
    box-shadow: 0 0 20px rgba(255, 105, 180, 0.7);
    text-align: center;
    z-index: 9999;
    opacity: 0;
    transition: opacity 0.5s ease;
    width: min(320px, 90vw);
  ">
    🚫 No peeking! Kavya, sorry bout that 
  </div>

  <script>
  // Disable Right-Click with Cute Popup
  document.addEventListener('contextmenu', function (event) {
    event.preventDefault();
    const popup = document.getElementById('rightClickPopup');
    popup.style.display = 'block';
    setTimeout(() => popup.style.opacity = '1', 10);

    // Fade out after 2 seconds
    setTimeout(() => {
      popup.style.opacity = '0';
      setTimeout(() => popup.style.display = 'none', 500);
    }, 2000);
  });
  </script>


  <script>
    // Floating minimal bubbles rising from the bottom ✨
    function createBubble() {
      const bubble = document.createElement('div');
      bubble.classList.add('bubble');
      const size = 10 + Math.random() * 15; // smaller & cuter
      bubble.style.width = `${size}px`;
      bubble.style.height = `${size}px`;
      bubble.style.left = Math.random() * 100 + 'vw';
      bubble.style.animationDuration = 8 + Math.random() * 6 + 's'; // slower movement
      bubble.style.opacity = 0.4 + Math.random() * 0.5;
      document.body.appendChild(bubble);
      setTimeout(() => bubble.remove(), 15000);
    }
    setInterval(createBubble, 250);

    // Soft background glow bubbles 🫧
    for (let i = 0; i < 6; i++) {
      const soft = document.createElement('div');
      soft.classList.add('soft-bubble');
      const size = 120 + Math.random() * 150;
      soft.style.width = `${size}px`;
      soft.style.height = `${size}px`;
      soft.style.left = Math.random() * 100 + 'vw';
      soft.style.top = Math.random() * 100 + 'vh';
      soft.style.animationDelay = Math.random() * 10 + 's';
      document.body.appendChild(soft);
    }
  </script>

  <script>
// 🩷 Cute bubbly mouse trail effect ✨
document.addEventListener("mousemove", (e) => {
  const trail = document.createElement("div");
  trail.classList.add("mouse-bubble");
  const size = 8 + Math.random() * 18;
  trail.style.width = `${size}px`;
  trail.style.height = `${size}px`;
  trail.style.left = `${e.pageX - size / 2}px`;
  trail.style.top = `${e.pageY - size / 2}px`;
  trail.style.background = `radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), rgba(255,180,220,0.5))`;
  document.body.appendChild(trail);

  setTimeout(() => {
    trail.style.opacity = "0";
    trail.style.transform = "translateY(-10px) scale(1.3)";
  }, 50);
  setTimeout(() => trail.remove(), 800);
});
</script>

<script>
let typed = '';
const secretCode = 'ily';

document.addEventListener('keydown', (e) => {
  typed += e.key.toLowerCase();

  // Keep only the last few characters to match secretCode length
  if (typed.length > secretCode.length) typed = typed.slice(-secretCode.length);

  if (typed === secretCode) {
    showCuteEffectThenRedirect();
    typed = ''; // reset so it can trigger again
  }
});

function showCuteEffectThenRedirect() {
  // Create hearts floating effect
  for (let i = 0; i < 50; i++) {
    const heart = document.createElement('div');
    heart.textContent = '💖';
    heart.style.position = 'absolute';
    heart.style.left = Math.random() * window.innerWidth + 'px';
    heart.style.top = Math.random() * window.innerHeight + 'px';
    heart.style.fontSize = (20 + Math.random() * 30) + 'px';
    heart.style.opacity = Math.random();
    heart.style.transition = 'all 2s ease-out';
    document.body.appendChild(heart);

    setTimeout(() => {
      heart.style.top = (parseFloat(heart.style.top) - 200) + 'px';
      heart.style.opacity = 0;
    }, 50);

    setTimeout(() => heart.remove(), 2500);
  }

  // Optional: fade out the whole page slightly for transition
  document.body.style.transition = 'background 1s ease, opacity 1s ease';
  document.body.style.opacity = 0.8;

  // Redirect after effect
  setTimeout(() => {
    window.location.href = 'secret/index.html';
  }, 2500); // matches the heart animation duration
}
</script>

<script>
function showGenshinPopup() {
  const popup = document.getElementById("genshinPopup");
  popup.style.display = "block";
  setTimeout(() => {
    popup.style.opacity = "1";
    popup.style.transform = "translate(-50%, -50%) scale(1)";
  }, 10);

  // Fade out automatically after 5 seconds
  setTimeout(() => {
    popup.style.opacity = "0";
    popup.style.transform = "translate(-50%, -50%) scale(0.9)";
    setTimeout(() => popup.style.display = "none", 600);
  }, 5000);
}
</script>
  
</body>
</html>
