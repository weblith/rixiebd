<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stone Paper Scissors</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #f0f4ff, #d0e0ff);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      color: #333;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
      color: #444;
    }

    .scoreboard {
      margin: 20px 0;
      font-size: 1.2rem;
    }

    .choices {
      display: flex;
      gap: clamp(8px, 3vw, 20px);
      margin: 20px 0;
      flex-wrap: wrap;
      justify-content: center;
    }

    .choice {
      background: #fff;
      border: 2px solid #aaa;
      border-radius: 10px;
      padding: 15px clamp(10px, 3vw, 20px);
      cursor: pointer;
      font-size: 1rem;
      font-weight: bold;
      transition: transform 0.2s ease;
      min-height: 44px;
      touch-action: manipulation;
    }

    .choice:hover {
      transform: scale(1.05);
      border-color: #555;
    }

    .result {
      margin-top: 20px;
      font-size: 1.2rem;
      font-weight: bold;
    }

    .highlight {
      color: #2cb67d;
    }

    .loss {
      color: #ef4565;
    }

    .draw {
      color: #555;
    }

    .footer {
      margin-top: 40px;
      font-size: 0.9rem;
      color: #666;
    }

  .back-btn {
  position: fixed;
  left: 16px;
  top: 16px;
  background: linear-gradient(135deg, rgba(255,200,230,0.95), rgba(255,150,200,0.85));
  color: #7a1840;
  font-weight: 700;
  border-radius: 12px;
  padding: 10px 18px;
  border: 1px solid rgba(255, 120, 170, 0.4);
  box-shadow: 0 6px 20px rgba(140, 30, 70, 0.15);
  cursor: pointer;
  z-index: 1000;
  transition: all 0.25s ease;
  min-height: 44px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  touch-action: manipulation;
}
.back-btn:hover {
  background: linear-gradient(135deg, #ff9ec9, #ff7ab6);
  color: white;
  transform: translateY(-2px);
  box-shadow: 0 10px 24px rgba(255, 120, 160, 0.25);
}
  </style>
</head>
<body>
  <div class="back-btn" onclick="location.href='../direct.html'">← Back</div>
  <h1>🪨📄✂️ Stone Paper Scissors</h1>
  <div class="scoreboard">
    You: <span id="playerScore">0</span> | Computer: <span id="computerScore">0</span>
  </div>

  <div class="choices">
    <div class="choice" data-choice="stone">🪨 Stone</div>
    <div class="choice" data-choice="paper">📄 Paper</div>
    <div class="choice" data-choice="scissors">✂️ Scissors</div>
  </div>

  <div id="result" class="result">Make your move!</div>

  <div class="footer">First to 5 wins!</div>

    </div>
  <!-- Cute Right-Click Popup -->
  <div id="rightClickPopup" style="
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255, 182, 193, 0.95);
    color: #000;
    font-family: 'Signika', sans-serif;
    padding: 20px clamp(15px, 5vw, 40px);
    border-radius: 20px;
    font-size: clamp(16px, 4.5vw, 20px);
    box-shadow: 0 0 20px rgba(255, 105, 180, 0.7);
    text-align: center;
    z-index: 9999;
    opacity: 0;
    transition: opacity 0.5s ease;
    width: min(320px, 90vw);
  ">
    🚫 No peeking! Kavya, sorry bout that 
  </div>

  <script>
  // Disable Right-Click with Cute Popup
  document.addEventListener('contextmenu', function (event) {
    event.preventDefault();
    const popup = document.getElementById('rightClickPopup');
    popup.style.display = 'block';
    setTimeout(() => popup.style.opacity = '1', 10);

    // Fade out after 2 seconds
    setTimeout(() => {
      popup.style.opacity = '0';
      setTimeout(() => popup.style.display = 'none', 500);
    }, 2000);
  });
  </script>


  <script>
    const choices = document.querySelectorAll('.choice');
    const resultEl = document.getElementById('result');
    const playerScoreEl = document.getElementById('playerScore');
    const computerScoreEl = document.getElementById('computerScore');

    let playerScore = 0;
    let computerScore = 0;

    const beats = {
      stone: 'scissors',
      paper: 'stone',
      scissors: 'paper'
    };

    function getComputerChoice() {
      const options = ['stone', 'paper', 'scissors'];
      return options[Math.floor(Math.random() * options.length)];
    }

    function playRound(playerChoice) {
      const computerChoice = getComputerChoice();

      if (playerChoice === computerChoice) {
        resultEl.textContent = `Draw! You both chose ${playerChoice}.`;
        resultEl.className = 'result draw';
      } else if (beats[playerChoice] === computerChoice) {
        playerScore++;
        resultEl.textContent = `You win! ${playerChoice} beats ${computerChoice}.`;
        resultEl.className = 'result highlight';
      } else {
        computerScore++;
        resultEl.textContent = `You lose! ${computerChoice} beats ${playerChoice}.`;
        resultEl.className = 'result loss';
      }

      playerScoreEl.textContent = playerScore;
      computerScoreEl.textContent = computerScore;

      if (playerScore === 5 || computerScore === 5) {
        setTimeout(() => {
          alert(playerScore === 5 ? "🎉 You won the game!" : "😢 Computer won the game!");
          playerScore = 0;
          computerScore = 0;
          playerScoreEl.textContent = 0;
          computerScoreEl.textContent = 0;
          resultEl.textContent = "Make your move!";
          resultEl.className = 'result';
        }, 100);
      }
    }

    choices.forEach(choice => {
      choice.addEventListener('click', () => {
        const playerChoice = choice.dataset.choice;
        playRound(playerChoice);
      });
    });
  </script>
</body>
</html>
